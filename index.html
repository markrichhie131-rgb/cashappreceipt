<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash UI</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", sans-serif;
  background: #f6f6f6;
}

.container {
  max-width: 420px;
  margin: auto;
  background: #fff;
  height: 100vh;
  position: relative;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 12px 15px;
}

.header .left {
  font-size: 22px;
}

.header .center {
  flex: 1;
  text-align: center;
}

.center .amount {
  font-size: 22px;
  font-weight: 600;
}

.center .sub {
  font-size: 13px;
  color: #888;
}

.pay-btn {
  background: #00d64f;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 20px;
  font-weight: 600;
  cursor: pointer;
}

/* INPUT ROWS */
.field {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  border-top: 1px solid #eee;
}

.label {
  width: 90px;
  font-weight: 600;
}

.field input {
  border: none;
  flex: 1;
  font-size: 16px;
  outline: none;
}

.field input::placeholder {
  color: #aaa;
}

/* DYNAMIC LINK LOOKUP TOOL */
#lookupLinkContainer {
  padding: 0 16px 14px 106px;
  font-size: 13px;
  display: none;
  background: #fff;
}

#externalLookupLink {
  color: #00d64f;
  text-decoration: none;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

#externalLookupLink:hover {
  text-decoration: underline;
}

/* SEND AS */
.send-as {
  display: flex;
  gap: 10px;
  padding: 14px 16px;
  border-top: 1px solid #eee;
}

.send-as button {
  border: none;
  padding: 8px 14px;
  border-radius: 18px;
  background: #efefef;
  font-size: 14px;
}

.send-as .active {
  background: #00d64f;
  color: white;
}

/* SUGGESTED */
.section-title {
  font-size: 11px;
  color: #999;
  padding: 8px 16px;
  letter-spacing: 1px;
}

.item {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  cursor: pointer;
}

.item input {
  margin-right: 10px;
}

.avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  margin-right: 12px;
}

.info {
  flex: 1;
  font-size: 15px;
}

.info span {
  display: block;
  font-size: 13px;
  color: #888;
}

.icon {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: #e5e5e5;
}

/* PIN SCREEN OVERLAY */
#pinOverlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: #fff;
  z-index: 10;
  max-width: 420px;
  margin: auto;
  box-sizing: border-box;
  padding: 40px 20px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.pin-title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 10px;
}

.pin-sub {
  font-size: 14px;
  color: #888;
  margin-bottom: 30px;
}

.pin-dots {
  display: flex;
  gap: 20px;
  margin-bottom: 40px;
}

.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid #ccc;
  transition: background 0.1s ease;
}

.dot.filled {
  background: #00d64f;
  border-color: #00d64f;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  width: 100%;
  max-width: 280px;
}

.key {
  height: 65px;
  border-radius: 50%;
  background: #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
}

.key:active {
  background: #e0e0e0;
}

.key.action {
  background: transparent;
  font-size: 16px;
  font-weight: normal;
}

.error-msg {
  color: #ff2d55;
  font-size: 14px;
  margin-top: 15px;
  height: 20px;
  font-weight: 500;
}

/* RECEIPT SCREEN */
#receiptScreen {
  display: none;
  max-width: 420px;
  margin: auto;
  height: 100vh;
  background: #f3f3f3;
  position: relative;
  padding: 30px;
  box-sizing: border-box;
}

.checkmark {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: #00d64f;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  margin-top: 40px;
}

#receiptText {
  margin-top: 40px;
  font-size: 28px;
  font-weight: 600;
  line-height: 1.4;
  color: #222;
}

#doneBtn {
  position: absolute;
  bottom: 40px;
  left: 30px;
  right: 30px;
  border: none;
  background: #00d64f;
  color: white;
  height: 56px;
  border-radius: 30px;
  font-size: 22px;
  font-weight: 600;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="left">✕</div>
    <div class="center">
      <div class="amount" id="amount">$4,000</div>
      <div class="sub">Blockchain ▼</div>
    </div>
    <button class="pay-btn" id="payBtn">Pay</button>
  </div>

  <div class="field">
    <div class="label">To</div>
    <input id="toInput" placeholder="Name, $Cashtag, Phone, Email" autocomplete="off">
  </div>

  <div id="lookupLinkContainer">
    <a id="externalLookupLink" href="#" target="_blank">
      Verify Profile ↗
    </a>
  </div>

  <div class="field">
    <div class="label">For</div>
    <input placeholder="Add a note">
  </div>

  <div class="field">
    <div class="label">Email</div>
    <input type="email" placeholder="Enter email">
  </div>

  <div class="send-as">
    <button class="active">Cash</button>
    <button>Gift Card ▼</button>
    <button>Stock ▼</button>
  </div>

  <div class="section-title">SUGGESTED</div>
  <div id="list"></div>

</div>

<div id="pinOverlay">
  <div class="pin-title">Enter Cash PIN</div>
  <div class="pin-sub">Please verify your identity to proceed</div>
  
  <div class="pin-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="keypad">
    <div class="key" onclick="pressKey('1')">1</div>
    <div class="key" onclick="pressKey('2')">2</div>
    <div class="key" onclick="pressKey('3')">3</div>
    <div class="key" onclick="pressKey('4')">4</div>
    <div class="key" onclick="pressKey('5')">5</div>
    <div class="key" onclick="pressKey('6')">6</div>
    <div class="key" onclick="pressKey('7')">7</div>
    <div class="key" onclick="pressKey('8')">8</div>
    <div class="key" onclick="pressKey('9')">9</div>
    <div class="key action" onclick="pressKey('Cancel')">Cancel</div>
    <div class="key" onclick="pressKey('0')">0</div>
    <div class="key action" onclick="pressKey('Delete')">⌫</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
</div>

<div id="receiptScreen">
  <div class="checkmark">✓</div>
  <div id="receiptText"></div>
  <button id="doneBtn">Done</button>
</div>

<script>
const users = [
  {name:"Kellen Bates", tag:"$Voidosu", color:"#ff2d55", letter:"K"},
  {name:"Kate Howard", tag:"$LKhowz", color:"#8B5E3C", letter:"K"},
  {name:"Julia Wilson", tag:"$wilson8823", color:"#5A31F4", letter:"J"},
  {name:"Joshua Aguilar", tag:"$aguilarjoshua18", color:"#C76DDB", letter:"J"},
  {name:"Haylee Walls", tag:"$HayleeWalls", color:"#88A83F", letter:"H"},
  {name:"Cierra Shepard", tag:"$brutallyhonestcc", color:"#4A3B66", letter:"C"},
  {name:"Camron Watkins", tag:"$kambam3118", color:"#1E4DB7", letter:"C"},
  {name:"Alma Davis", tag:"$Ladyboss4ever", color:"#F4F44C", letter:"A"}
];

const CORRECT_PIN = "1234"; 
let currentPinInput = "";

const list = document.getElementById("list");

// Render the suggested list items
users.forEach((user, index) => {
  const div = document.createElement("div");
  div.className = "item";
  div.innerHTML = `
    <input type="checkbox">
    <div class="avatar" style="background:${user.color}">${user.letter}</div>
    <div class="info">${user.name}<span>${user.tag}</span></div>
    <div class="icon"></div>
  `;

  div.addEventListener("click", () => {
    selectedUser = user;
    toInput.value = user.name;
    lookupContainer.style.display = "none"; // Hide link for suggested users
  });
  list.appendChild(div);
});

// DOM ELEMENTS
const toInput = document.getElementById("toInput");
const lookupContainer = document.getElementById("lookupLinkContainer");
const externalLink = document.getElementById("externalLookupLink");

const payBtn = document.getElementById("payBtn");
const amountEl = document.getElementById("amount");

const pinOverlay = document.getElementById("pinOverlay");
const errorMsg = document.getElementById("errorMsg");
const dots = document.querySelectorAll(".dot");

const receiptScreen = document.getElementById("receiptScreen");
const receiptText = document.getElementById("receiptText");
const doneBtn = document.getElementById("doneBtn");

let selectedUser = null;

// INPUT LISTENER FOR THE DYNAMIC LINK GENERATION
toInput.addEventListener("input", () => {
  const value = toInput.value.trim();

  // If input format starts with '$' and has more characters, update and show the link
  if (value.startsWith("$") && value.length > 1) {
    const cleanTag = value.replace("$", "");
    
    externalLink.href = `https://cash.app/$${cleanTag}`;
    externalLink.innerText = `View live profile for ${value} ↗`;
    
    lookupContainer.style.display = "block";
  } else {
    // Hide lookup layout if they empty the input or type standard text names
    lookupContainer.style.display = "none";
  }
});

// PAY BUTTON CLICKED
payBtn.addEventListener("click", () => {
  const recipient = toInput.value.trim();
  if(!recipient) {
    alert("Please enter recipient");
    return;
  }
  openPinScreen();
});

// PIN LAYER SYSTEM ARCHITECTURE
function openPinScreen() {
  currentPinInput = "";
  errorMsg.innerText = "";
  updatePinDots();
  pinOverlay.style.display = "flex";
}

function updatePinDots() {
  dots.forEach((dot, index) => {
    if (index < currentPinInput.length) {
      dot.classList.add("filled");
    } else {
      dot.classList.remove("filled");
    }
  });
}

function pressKey(key) {
  errorMsg.innerText = ""; 
  
  if (key === 'Cancel') {
    pinOverlay.style.display = "none";
    return;
  }
  
  if (key === 'Delete') {
    currentPinInput = currentPinInput.slice(0, -1);
    updatePinDots();
    return;
  }

  if (currentPinInput.length < 4) {
    currentPinInput += key;
    updatePinDots();
  }

  if (currentPinInput.length === 4) {
    setTimeout(() => {
      if (currentPinInput === CORRECT_PIN) {
        processPayment();
      } else {
        errorMsg.innerText = "Incorrect PIN. Try again.";
        currentPinInput = "";
        updatePinDots();
      }
    }, 200);
  }
}

function processPayment() {
  const recipient = toInput.value.trim();
  const amount = amountEl.innerText;

  pinOverlay.style.display = "none";
  document.querySelector(".container").style.display = "none";

  receiptScreen.style.display = "block";
  receiptText.innerHTML = `
    You sent ${amount}<br>
    to ${recipient}
  `;
}

// DONE BUTTON
doneBtn.addEventListener("click", () => {
  receiptScreen.style.display = "none";
  document.querySelector(".container").style.display = "block";
  toInput.value = ""; 
  lookupContainer.style.display = "none";
});
</script>

</body>
</html>
